name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (with dev + generate extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,generate]'

      - name: Run tests
        # Expected result on fresh-CI (no hft-ops): 293 passing + 5 skipped.
        # The 5 shim-parity tests skip via pytest.importorskip("hft_ops").
        run: pytest -q --tb=short

      - name: Lint (non-blocking)
        # ruff check is informational on first-public-release CI. A
        # follow-up PR will add a [tool.ruff] config + make this gating.
        # `continue-on-error` keeps the step's exit code in the UI
        # (yellow/red instead of silent green from `|| true`).
        continue-on-error: true
        run: ruff check src tests
